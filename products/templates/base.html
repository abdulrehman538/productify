<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Productify{% endblock %}</title>
<style>
    :root {
        --bg: #f4f7fb;
        --surface: #ffffff;
        --surface-soft: #f8fafc;
        --border: #d9e2ec;
        --text: #132033;
        --muted: #637083;
        --primary: #0f766e;
        --primary-dark: #0b5f59;
        --primary-soft: #e1f3f1;
        --accent: #2563eb;
        --danger: #b42318;
        --danger-soft: #fff1f0;
        --shadow: 0 18px 44px rgba(15, 23, 42, 0.08);
        --radius: 8px;
    }

    * { box-sizing: border-box; }

    body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, Helvetica, sans-serif;
        background: var(--bg);
        color: var(--text);
    }

    a { color: inherit; }

    .app-shell {
        min-height: 100vh;
    }

    .topbar {
        position: sticky;
        top: 0;
        z-index: 10;
        background: rgba(255, 255, 255, 0.94);
        border-bottom: 1px solid var(--border);
        backdrop-filter: blur(10px);
    }

    .topbar-inner {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        min-height: 66px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
    }

    .brand {
        color: var(--primary);
        font-size: 24px;
        font-weight: 800;
        text-decoration: none;
        letter-spacing: 0;
    }

    .nav {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
    }

    .nav a,
    .button,
    button {
        border: 0;
        border-radius: 6px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 40px;
        padding: 10px 14px;
        text-decoration: none;
        font: inherit;
        font-size: 14px;
        font-weight: 700;
    }

    .nav a,
    .button,
    button[type="submit"] {
        background: var(--primary);
        color: #ffffff;
        box-shadow: 0 10px 22px rgba(15, 118, 110, 0.18);
    }

    .nav a:hover,
    .button:hover,
    button[type="submit"]:hover {
        background: var(--primary-dark);
    }

    .nav .secondary,
    .button.secondary {
        background: var(--primary-soft);
        color: var(--primary-dark);
        box-shadow: none;
    }

    .page {
        width: min(1180px, calc(100% - 32px));
        margin: 32px auto;
    }

    .page-wide {
        width: calc(100% - 32px);
        margin: 32px 16px;
    }

    .page-header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 18px;
        margin-bottom: 22px;
    }

    h1, h2, p { margin-top: 0; }

    h1 {
        margin-bottom: 7px;
        font-size: 34px;
        line-height: 1.15;
        letter-spacing: 0;
    }

    h2 {
        margin-bottom: 8px;
        font-size: 22px;
        line-height: 1.25;
        letter-spacing: 0;
    }

    .muted {
        color: var(--muted);
        margin-bottom: 0;
        line-height: 1.5;
    }

    .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 28px;
    }

    label {
        display: block;
        margin-bottom: 7px;
        color: #263449;
        font-size: 14px;
        font-weight: 700;
    }

    input,
    textarea {
        width: 100%;
        border: 1px solid #c7d2df;
        border-radius: 6px;
        background: var(--surface-soft);
        color: var(--text);
        font: inherit;
        padding: 12px 13px;
        outline: none;
        transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    textarea {
        min-height: 120px;
        resize: vertical;
    }

    input:focus,
    textarea:focus {
        border-color: var(--primary);
        background: #ffffff;
        box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.13);
    }

    ::placeholder {
        color: #94a3b8;
        opacity: 1;
    }

    form p {
        margin: 0 0 18px;
    }

    .error,
    .errorlist {
        margin: 0 0 12px;
        padding: 11px 12px;
        border-radius: 6px;
        background: var(--danger-soft);
        color: var(--danger);
        font-size: 14px;
        line-height: 1.4;
        list-style: none;
    }

    .table-wrap {
        width: 100%;
        overflow-x: auto;
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    th,
    td {
        padding: 14px 12px;
        border-bottom: 1px solid #e4ebf3;
        text-align: left;
        vertical-align: top;
    }

    th {
        color: #516174;
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
    }

    tr:hover td {
        background: #fbfdff;
    }

    .auth-page {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 32px 16px;
        background: linear-gradient(135deg, #173b63, #0f766e);
    }

    .auth-card {
        width: min(420px, 100%);
        background: #ffffff;
        border-radius: var(--radius);
        box-shadow: 0 24px 70px rgba(5, 18, 35, 0.28);
        padding: 34px;
    }

    .auth-brand {
        margin-bottom: 6px;
        color: var(--primary);
        font-size: 32px;
        font-weight: 800;
        text-align: center;
    }

    .auth-title {
        margin-bottom: 24px;
        color: var(--text);
        font-size: 18px;
        text-align: center;
    }

    @media (max-width: 760px) {
        .topbar-inner,
        .page-header {
            align-items: flex-start;
            flex-direction: column;
        }

        .page,
        .page-wide {
            width: calc(100% - 24px);
            margin: 24px 12px;
        }

        .panel,
        .auth-card {
            padding: 22px;
        }

        h1 {
            font-size: 28px;
        }
    }
</style>
{% block extra_css %}{% endblock %}
</head>
<body>
{% block body %}
<div class="app-shell">
    {% if user.is_authenticated %}
    <header class="topbar">
        <div class="topbar-inner">
            <a class="brand" href="{% url 'home' %}">Productify</a>
            <nav class="nav">
                <a class="secondary" href="{% url 'home' %}">Dashboard</a>
                <a href="{% url 'create' %}">Add Product</a>
                <a class="secondary" href="{% url 'myproduct' %}">My Products</a>
                <a class="secondary" href="{% url 'logout' %}">Logout</a>
            </nav>
        </div>
    </header>
    {% endif %}
    {% block content %}{% endblock %}
</div>
{% endblock %}
{% block scripts %}{% endblock %}
</body>
</html>
