<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Productify{% endblock %}</title>
    <style>
        * { box-sizing: border-box; }
        :root {
            --bg: #eef7fb;
            --surface: #ffffff;
            --surface-soft: #f8fafc;
            --border: #dbe4ee;
            --text: #142033;
            --muted: #64748b;
            --primary: #4f97d1;
            --primary-dark: #377fb8;
            --accent: #11796f;
            --danger: #dc3545;
            --danger-soft: #fee2e2;
            --shadow: 0 14px 36px rgba(16, 30, 54, 0.08);
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            min-height: 100vh;
        }
        a { color: inherit; }
        .topbar {
            align-items: center;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            box-shadow: 0 8px 22px rgba(16, 30, 54, 0.04);
            display: flex;
            gap: 16px;
            justify-content: space-between;
            padding: 14px 24px;
            position: sticky;
            top: 0;
            z-index: 20;
        }
        .brand {
            color: var(--accent);
            font-size: 26px;
            font-style: italic;
            font-weight: 800;
            letter-spacing: 0;
            text-decoration: none;
        }
        .nav {
            align-items: center;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .nav a,
        .btn {
            align-items: center;
            border: 0;
            border-radius: 6px;
            cursor: pointer;
            display: inline-flex;
            font: inherit;
            font-size: 14px;
            font-weight: 700;
            justify-content: center;
            min-height: 40px;
            padding: 10px 14px;
            text-decoration: none;
        }
        .nav a {
            background: #ebf5ff;
            color: var(--primary-dark);
        }
        .nav a.primary,
        .btn-primary {
            background: var(--primary);
            color: #ffffff;
        }
        .btn-secondary {
            background: #ebf5ff;
            color: var(--primary-dark);
        }
        .btn-accent {
            background: var(--accent);
            color: #ffffff;
        }
        .btn-danger {
            background: var(--danger-soft);
            color: var(--danger);
        }
        .page {
            margin: 28px auto;
            width: min(1160px, calc(100% - 32px));
        }
        .auth-page {
            align-items: center;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }
        .auth-panel,
        .panel,
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: var(--shadow);
        }
        .auth-panel {
            max-width: 460px;
            padding: 32px;
            width: 100%;
        }
        .panel { padding: 22px; }
        .card { overflow: hidden; }
        .page-header {
            align-items: flex-end;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: space-between;
            margin-bottom: 22px;
        }
        h1, h2, h3, p { letter-spacing: 0; }
        h1 { font-size: 34px; line-height: 1.2; margin: 0 0 6px; }
        h2 { font-size: 22px; line-height: 1.25; margin: 0 0 12px; }
        h3 { margin: 0; }
        .muted { color: var(--muted); margin: 0; }
        label {
            color: #253244;
            display: block;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 7px;
        }
        input,
        textarea,
        select {
            background: var(--surface-soft);
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            color: #101827;
            font: inherit;
            min-height: 42px;
            outline: none;
            padding: 12px 13px;
            width: 100%;
        }
        textarea {
            min-height: 120px;
            resize: vertical;
        }
        input:focus,
        textarea:focus,
        select:focus {
            background: #ffffff;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 151, 209, 0.14);
        }
        input[readonly] {
            background: #eef6fd;
            color: #526173;
        }
        .field-group { margin-bottom: 18px; }
        .errorlist {
            background: #fff1f2;
            border-radius: 6px;
            color: #be123c;
            font-size: 14px;
            line-height: 1.4;
            list-style: none;
            margin: 0 0 8px;
            padding: 10px 12px;
        }
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .tools {
            align-items: end;
            display: grid;
            gap: 1rem;
            grid-template-columns: minmax(220px, 2fr) repeat(3, minmax(120px, 1fr)) auto;
            margin-bottom: 2rem;
        }
        .grid {
            display: grid;
            gap: 18px;
        }
        .stats-grid { grid-template-columns: 1fr 1fr 2fr; }
        .product-grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
        .metric {
            color: var(--primary);
            font-size: 42px;
            font-weight: 800;
            margin: 8px 0 0;
        }
        table {
            border-collapse: collapse;
            margin-top: 12px;
            width: 100%;
        }
        th, td {
            border-bottom: 1px solid #e2e8f0;
            padding: 12px;
            text-align: left;
            vertical-align: top;
        }
        th {
            color: #475569;
            font-size: 13px;
            text-transform: uppercase;
        }
        .product-image,
        .image-placeholder {
            background: #e2e8f0;
            display: block;
            height: 220px;
            object-fit: cover;
            width: 100%;
        }
        .image-placeholder {
            align-items: center;
            color: #94a3b8;
            display: flex;
            font-weight: 700;
            justify-content: center;
        }
        .product-body { padding: 18px; }
        .price {
            color: var(--primary);
            font-size: 18px;
            font-weight: 800;
            margin: 8px 0 12px;
        }
        .description {
            color: #475569;
            line-height: 1.6;
        }
        .app-lockup {
            color: var(--accent);
            display: block;
            font-size: 34px;
            font-style: italic;
            font-weight: 800;
            margin-bottom: 18px;
            text-align: center;
            text-decoration: none;
        }
        @media (max-width: 840px) {
            .topbar,
            .page-header {
                align-items: flex-start;
                flex-direction: column;
            }
            .stats-grid,
            .tools {
                grid-template-columns: 1fr;
            }
            h1 { font-size: 28px; }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
    {% block shell %}
        {% if user.is_authenticated %}
            <header class="topbar">
                <a class="brand" href="{% url 'home' %}">Productify</a>
                <nav class="nav">
                    <a href="{% url 'home' %}">Dashboard</a>
                    <a href="{% url 'myproduct' %}">My Products</a>
                    <a class="primary" href="{% url 'create' %}">Add Product</a>
                    <a href="{% url 'logout' %}">Logout</a>
                </nav>
            </header>
        {% endif %}

        <main class="{% if user.is_authenticated %}page{% else %}auth-page{% endif %}">
            {% block content %}{% endblock %}
        </main>
    {% endblock %}
    {% block scripts %}{% endblock %}
</body>
</html>
