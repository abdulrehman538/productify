<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Products</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            color: #17202a;
            background:
                linear-gradient(135deg, rgba(28, 87, 148, 0.88), rgba(17, 121, 111, 0.88)),
                #eef3f7;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 22px 70px rgba(16, 30, 54, 0.26);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #101827;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #11796f;
            color: white;
            padding: 12px;
            text-align: left;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }

        tr:hover {
            background: #f1f5f9;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 15px;
            background: #11796f;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            text-decoration: none;
        }

        .back-btn:hover {
            background: #0f6b63;
        }
    </style>
</head>

<body>

    <div class="container">

        <a href="/create/" class="back-btn">← Back</a>

        <h2>My Products</h2>

        <table>
            <tr>
                <th>Name</th>
                <th>Price</th>
                <th>Description</th>
                <th>Email</th>
            </tr>

            {% for product in products %}
            <tr>
                <td>{{ product.name }}</td>
                <td>{{ product.price }}</td>
                <td>{{ product.description }}</td>
                <td>{{ product.email }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4" style="text-align:center;">No products found</td>
            </tr>
            {% endfor %}
        </table>

    </div>

</body>
</html>
