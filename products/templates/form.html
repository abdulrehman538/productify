<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if product %}Edit Product{% else %}Add Product{% endif %}</title>
<style>
    * { box-sizing: border-box; }
    body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, Helvetica, sans-serif;
        color: #17202a;
        background: #eef3f7;
    }
    .topbar {
        background: #ffffff;
        border-bottom: 1px solid #dbe4ee;
        padding: 14px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
    }
    .brand {
        color: #11796f;
        font-size: 22px;
        font-weight: 800;
        text-decoration: none;
    }
    .nav {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
    }
    .nav a {
        border-radius: 6px;
        background: #dcefed;
        color: #0f615b;
        min-height: 38px;
        padding: 9px 14px;
        text-decoration: none;
        font-weight: 700;
        font-size: 14px;
    }
    main {
        width: min(520px, calc(100% - 32px));
        margin: 32px auto;
    }
    .form-panel {
        background: #ffffff;
        border: 1px solid #dbe4ee;
        border-radius: 8px;
        box-shadow: 0 14px 36px rgba(16, 30, 54, 0.08);
        padding: 34px;
    }
    h1 {
        margin: 0 0 8px;
        font-size: 28px;
        line-height: 1.2;
        color: #101827;
    }
    .subtitle {
        margin: 0 0 28px;
        color: #64748b;
        font-size: 15px;
        line-height: 1.5;
    }
    form p {
        margin: 0 0 18px;
    }
    label {
        display: block;
        margin-bottom: 7px;
        font-size: 14px;
        font-weight: 700;
        color: #253244;
    }
    input,
    textarea {
        width: 100%;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        background: #f8fafc;
        color: #101827;
        font: inherit;
        padding: 12px 13px;
        outline: none;
        transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }
    textarea {
        min-height: 120px;
        resize: vertical;
    }
    input:focus,
    textarea:focus {
        border-color: #11796f;
        background: #ffffff;
        box-shadow: 0 0 0 4px rgba(17, 121, 111, 0.14);
    }
    .errorlist {
        margin: 0 0 8px;
        padding: 10px 12px;
        list-style: none;
        border-radius: 6px;
        background: #fff1f2;
        color: #be123c;
        font-size: 14px;
        line-height: 1.4;
    }
    .save-button {
        width: 100%;
        border: 0;
        border-radius: 6px;
        background: #11796f;
        color: #ffffff;
        cursor: pointer;
        font-size: 16px;
        font-weight: 700;
        padding: 13px 18px;
        margin-top: 8px;
        box-shadow: 0 12px 26px rgba(17, 121, 111, 0.28);
    }
    .save-button:hover {
        background: #0f6b63;
    }
    @media (max-width: 560px) {
        .topbar {
            align-items: flex-start;
            flex-direction: column;
        }
        .form-panel {
            padding: 24px;
        }
    }
</style>
</head>
<body>
<header class="topbar">
    <a class="brand" href="{% url 'home' %}">Productify</a>
    <nav class="nav">
        <a href="{% url 'home' %}">Dashboard</a>
        <a href="{% url 'myproduct' %}">My Products</a>
        <a href="{% url 'logout' %}">Logout</a>
    </nav>
</header>

<main>
    <section class="form-panel">
        <h1>{% if product %}Edit Product{% else %}Add Product{% endif %}</h1>
        <p class="subtitle">
            {% if product %}
                Update this product in your catalog.
            {% else %}
                Enter the product details below and save them to your catalog.
            {% endif %}
        </p>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="save-button" type="submit">
                {% if product %}Save Changes{% else %}Save Product{% endif %}
            </button>
        </form>
    </section>
</main>
</body>
</html>
