<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productify Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lato:ital,wght@1,700&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            color: #17202a;
            background:
                linear-gradient(135deg, rgba(91, 155, 213, 0.88), rgba(74, 138, 196, 0.88)), /* Sky blue gradient overlay */
                url('https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=2940&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D') center center / cover no-repeat; /* Product image background */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px 16px; /* Keep padding */
        }
        ::placeholder {
        color: #94a3b8;   /* soft grey */
        opacity: 1;
        }

        .login-box {
            /* This now represents the left-side login form section */
            flex: 1;
            padding: 40px;
            background: transparent; /* No white background */
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* Move content towards the top */
            color: #ffffff; /* White text for visibility on background */
            text-align: left;
        }

        .login-container { /* New container to hold both marketing and login box */
            display: flex;
            max-width: 95%; /* Use most of the screen width */
            width: 100%;
            background: transparent; /* No white background */
            box-shadow: none; /* No shadow */
        }

        .marketing-section {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: #ffffff; /* White text */
            background: transparent; /* No background */
            text-align: right; /* Align text to the right */
        }

        .marketing-section h1 {
            font-size: 52px; /* Much larger font */
            font-weight: 800;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .marketing-section p {
            font-size: 24px; /* Much larger font */
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .app-name {
            width: 100%;
            text-align: center; /* Centered the app name */
            color: #ffffff; /* White text for visibility */
            font-size: 64px; /* Larger brand name */
            font-family: 'Lato', sans-serif;
            font-style: italic;
            font-weight: 700;
            margin: 0 0 40px 0; /* Space below it */
        }

        h2 {
            margin: 0 0 20px;
            text-align: left;
            color: #ffffff; /* White text for visibility */
            font-size: 24px;
            font-weight: 700;
        }

        input {
            width: 100%;
            padding: 18px; /* Bigger input fields */
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.5); /* Lighter border for transparent background */
            border-radius: 6px;
            background: #f8fafc;
            font-size: 18px; /* Larger font for readability */
        }

        input:focus {
            border-color: #5B9BD5; /* Primary sky blue */
            background: rgba(255, 255, 255, 0.9); /* Slightly opaque white on focus */
            box-shadow: 0 0 0 4px rgba(91, 155, 213, 0.14); /* Sky blue shadow */
            outline: none;
        }

        button {
            width: 100%;
            padding: 18px; /* Bigger button */
            background: #11796f;
            background: #5B9BD5; /* Primary sky blue */
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px; /* Larger font */
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 12px 26px rgba(91, 155, 213, 0.28); /* Sky blue shadow */
        }
        button:hover {
            background: #4A8AC4; /* Darker sky blue on hover */
        }

        .error {
            margin-top: 10px;
            text-align: center;
            font-size: 14px;
            color: #FFDCDC; /* Lighter red for error on dark background */
        }

        @media (max-width: 768px) { /* Responsive adjustments */
            .login-container {
                flex-direction: column;
                gap: 20px; /* Adjust gap for smaller screens */
            }
            .marketing-section {
                padding: 30px;
                text-align: center;
            }
            .login-box {
                padding: 30px; /* Keep padding */
                text-align: center; /* Center content when stacked */
            }
        }
    </style>
</head>

<body>

    <div class="app-name">Productify</div>

    <div class="login-container"> <!-- This now acts as the main wrapper for the two sections -->
        <div class="login-box"> <!-- This is the left-side login form section -->
            <h2>Login Here</h2>

            <form method="POST">
                {% csrf_token %}

                <input type="text" name="username" placeholder="Type username" style="border-radius: 25px;">
                <input type="password" name="password" placeholder="Type password" style="border-radius: 25px;">

                <button type="submit" style="border-radius: 25px;">Login</button>
            </form>

            {% if error %}
                <p class="error">{{ error }}</p>
            {% endif %}
        </div>
        <div class="marketing-section">
            <h1>Start an online store for free</h1>
            <p>Productify is the all-in-one platform to build, run, and grow your online boutique.</p>
            <p>Start free, then get 3 months for $1/month.</p>
        </div>
    </div>

</body>
</html>
