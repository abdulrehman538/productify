<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productify Login</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            color: #17202a;
            background:
                linear-gradient(135deg, rgba(28, 87, 148, 0.88), rgba(17, 121, 111, 0.88)),
                #eef3f7;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
        }
        ::placeholder {
        color: #94a3b8;   /* soft grey */
        opacity: 1;
        }

        .login-box {
            width: 100%;
            max-width: 400px;
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 22px 70px rgba(16, 30, 54, 0.26);
            padding: 30px;
        }

        .app-name {
            margin: 0 0 6px;
            text-align: center;
            color: #11796f;
            font-size: 30px;
            font-weight: 800;
        }

        h2 {
            margin: 0 0 20px;
            text-align: center;
            color: #101827;
            font-size: 18px;
            font-weight: 700;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            background: #f8fafc;
            font-size: 14px;
        }

        input:focus {
            border-color: #11796f;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(17, 121, 111, 0.14);
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #11796f;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 12px 26px rgba(17, 121, 111, 0.28);
        }

        button:hover {
            background: #0f6b63;
        }

        .error {
            margin-top: 10px;
            color: #be123c;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <div class="app-name">Productify</div>
        <h2>Login</h2>

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="username" placeholder="Type username" >
            <input type="password" name="password" placeholder="Type password" >

            <button type="submit">Login</button>
        </form>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
    </div>

</body>
</html>
